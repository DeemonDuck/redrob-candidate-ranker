# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        # e.g. for architecture discussion, code review
  - "ChatGPT"  # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  Briefly describe how AI tools were used. Examples:
  - "Used Claude for layer design and architectural discussion, code-review and major debugging."
  - "No candidate data was fed to any LLM at any point  — the ranking pipeline is fully rule-based and runs without network access"
  - "Used ChatGPT to debug minor Python issues as well as for generating testing scripts for each layer"

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  
  "Five-layer rule-based pipeline with explicit signal separation. Layer 1
  eliminates honeypots (impossible tenure, expert-skill-zero-usage, experience
  mismatch) and hard disqualifiers (experience floor, pure services career,
  wrong domain). Layer 2 converts soft signals into a weighted JD-fit score
  across five dimensions: career-skills alignment, trusted must-have skills,
  must-have evidence in career text, production deployment evidence, and
  pre-LLM background — production evidence carries the highest weight (0.30)
  as the JD explicitly targets builders over researchers. Layer 3 scores
  location and availability independently. Layer 4 combines all signals into
  a final score (0.65*JD-fit + 0.10*location + 0.10*availability +
  0.15*platform behaviour). Layer 5 sorts, applies deterministic tie-breaking
  by candidate_id, and generates fact-grounded reasoning from real candidate
  data — no LLM. Key design decisions: ghost-skill detection via
  endorsement+duration trust multipliers, set-iteration determinism fix for
  reproducible scores across runs, and honeypot patterns handled before any
  scoring. Runtime: under 5 minutes on CPU for 100K candidates."

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: false        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
